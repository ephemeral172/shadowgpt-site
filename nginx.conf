server {
    listen 80 default_server;
    server_name shadowgpt.app www.shadowgpt.app _;
    root /usr/share/nginx/html;

    # Статические файлы — возвращать 404 если не найдены.
    location ~* \.(js|css|json|woff|woff2|ttf|eot|map)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Изображения и иконки
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Прокси статуса консоли (избегаем CORS: запрос с того же origin)
    location /api/status {
        proxy_pass https://console.shadowgpt.app;
        proxy_http_version 1.1;
        proxy_set_header Host console.shadowgpt.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # SPA — все маршруты React Router отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store";
    }
}
